name: Feature request
description: Suggest a focused improvement for Mneno.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API or behavior you want.
    validations:
      required: true
  - type: textarea
    id: explainability
    attributes:
      label: Explainability impact
      description: How should users inspect or verify this behavior?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
