name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run checks
        run: |
          ruff check .
          ruff format --check .
          mypy
          pytest

  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          package_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag_version = os.environ["RELEASE_TAG"].removeprefix("v")
          if tag_version != package_version:
              raise SystemExit(
                  f"Release tag {tag_version!r} does not match package version {package_version!r}"
              )
          PY

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check --strict dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: mneno-release-distributions
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/mneno/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: mneno-release-distributions
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
