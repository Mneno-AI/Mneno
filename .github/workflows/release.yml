name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run checks
        run: |
          ruff check .
          ruff format --check .
          mypy
          pytest

  build:
    name: Build universal release wheel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Check wheel
        run: python -m twine check dist/*-py3-none-any.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mneno-release-py3-none-any-wheel
          path: dist/*-py3-none-any.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/mneno/

    steps:
      - name: Download Linux wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: mneno-release-py3-none-any-wheel
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
